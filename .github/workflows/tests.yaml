name: Tests

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed generated artifacts
        run: ./scripts/check-no-generated-artifacts.sh

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build libgomesi
        run: cd libgomesi && go build -trimpath -ldflags="-s -w" -buildmode=c-shared -o libgomesi.so libgomesi.go

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          only-new-issues: false
          skip-cache: true
          args: ./mesi/...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./mesi/...

  apache-test:
    name: Apache Integration Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build libgomesi
        run: cd libgomesi && go build -trimpath -ldflags="-s -w" -buildmode=c-shared -o libgomesi.so libgomesi.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Apache Docker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/apache/Dockerfile
          push: false
          load: true
          tags: go-mesi-apache-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Apache tests
        run: cd servers/apache && ./test.sh

      - name: Cleanup
        if: always()
        run: cd servers/apache && docker compose down -v 2>/dev/null || true

  cli-test:
    name: CLI Unit Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download CLI dependencies
        run: cd cli && go mod download

      - name: Run CLI unit tests
        run: cd cli && go test -v -count=1 ./...

  cli-e2e-test:
    name: CLI E2E Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Download CLI dependencies
        run: cd cli && go mod download

      - name: Run CLI E2E tests
        run: cd cli && bash test.sh

      - name: Cleanup
        if: always()
        run: pkill -9 mesi-test-server 2>/dev/null || true

  proxy-test:
    name: Proxy Integration Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download proxy dependencies
        run: cd servers/proxy && go mod download

      - name: Run proxy unit tests
        run: cd servers/proxy && go test -v -count=1 ./...

      - name: Run proxy E2E tests
        run: cd servers/proxy && bash test.sh

      - name: Cleanup
        if: always()
        run: pkill -9 mesi-proxy-test 2>/dev/null || true; pkill -9 mesi-test-server 2>/dev/null || true

  nginx-test:
    name: Nginx Integration Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build libgomesi
        run: cd libgomesi && go build -trimpath -ldflags="-s -w" -buildmode=c-shared -o libgomesi.so libgomesi.go

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Nginx Docker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: servers/nginx/Dockerfile
          push: false
          load: true
          tags: go-mesi-nginx-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Nginx tests
        run: cd servers/nginx && ./test.sh

      - name: Cleanup
        if: always()
        run: cd servers/nginx && docker compose down -v 2>/dev/null || true

  ci:
    name: CI
    needs: [lint, test, apache-test, nginx-test, proxy-test, cli-test, cli-e2e-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.apache-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.nginx-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.proxy-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.cli-test.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.cli-e2e-test.result }}" != "success" ]; then exit 1; fi
