# Apache Memcached Cache Configuration Example
#
# This example shows how to enable Memcached-backed ESI fragment sharing
# across Apache workers and instances. Duplicate <esi:include> URLs within
# TTL are served from the Memcached cluster, reducing backend load.
#
# Pre-reqs:
#   - libgomesi.so built with the latest cache_config.go (#175/176)
#   - A reachable Memcached cluster (default port 11211)
#
# Usage:
#   Drop these directives into your httpd.conf / a VirtualHost and reload
#   Apache. Make sure the directives sit at server (RSRC_CONF) scope so
#   they apply to the merged server config the filter consumes.

# Enable mESI for this VirtualHost / server.
EnableMesi on

# Restrict <esi:include src=...> to backend hosts (optional SSRF guard).
MesiAllowedHosts backend raw.githubusercontent.com
MesiBlockPrivateIPs Off

# Memcached backend: must come BEFORE MesiCacheMemcachedServers if you want
# a shorter config block, but order is not enforced.
MesiCacheBackend memcached
MesiCacheTTL 60

# One host:port pair: simplest config. Writes to one Memcached server.
MesiCacheMemcachedServers 10.0.0.1:11211

# Multiple host:port pairs (consistent hashing in libgomesi branches across
# servers by URL hash, falls back on each Memcached independent):
# MesiCacheMemcachedServers 10.0.0.1:11211 10.0.0.2:11211 10.0.0.3:11211

# Mixed ports (e.g. Memcached on non-default port):
# MesiCacheMemcachedServers cache-a.internal:11211 cache-b.internal:11212

# To switch to Redis instead, replace the block above with:
# MesiCacheBackend redis
# MesiCacheRedisAddr 10.0.0.5:6379
# MesiCacheRedisPassword secret
# MesiCacheRedisDB 0
# MesiCacheTTL 60

# To switch back to in-memory cache (per-worker, no shared backing),
# replace the block above with:
# MesiCacheBackend memory
# MesiCacheSize 1000
# MesiCacheTTL 60
