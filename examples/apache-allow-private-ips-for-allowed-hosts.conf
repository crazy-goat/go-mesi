# Apache AllowPrivateIPsForAllowedHosts Configuration Example
#
# This example shows how to let ESI includes reach trusted internal backends
# that resolve to private/reserved IP addresses WITHOUT disabling SSRF
# protection for the rest of the site.
#
# The MesiAllowPrivateIPsForAllowedHosts directive bypasses the dial-time
# private-IP block ONLY for hosts listed in MesiAllowedHosts. It is a no-op
# unless BOTH MesiBlockPrivateIPs On AND a non-empty MesiAllowedHosts are set.
#
# Pre-reqs:
#   - libgomesi.so built with ParseWithConfigEx (libgomesi.go, #168)
#   - mod_mesi.so loaded via LoadModule
#
# SECURITY WARNING: this trusts DNS for hosts in MesiAllowedHosts. Only use
# with internal DNS (Consul, Kubernetes DNS, /etc/hosts). An attacker who can
# control DNS for an allowed host can reach arbitrary private IPs.

LoadModule mesi_module modules/mod_mesi.so

EnableMesi on

# Global default: block all ESI includes to private/reserved IPs.
MesiBlockPrivateIPs On

# Trusted internal hosts. Includes to these hosts may resolve to private
# IPs when MesiAllowPrivateIPsForAllowedHosts is On below.
MesiAllowedHosts backend.internal api.trusted.org

# Bypass the private-IP block for the allowed hosts above. Without this
# line (default Off), includes to backend.internal (a private IP) would be
# blocked by MesiBlockPrivateIPs even though the host is in MesiAllowedHosts.
MesiAllowPrivateIPsForAllowedHosts On

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass /backend/ http://backend.internal:8000/
    ProxyPassReverse /backend/ http://backend.internal:8000/
</VirtualHost>
