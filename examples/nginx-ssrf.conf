# Nginx SSRF Protection Configuration Example
#
# This example shows how to enable SSRF protection for ESI includes in nginx.
# The mesi_block_private_ips directive blocks <esi:include> targets that
# resolve to private/reserved IP addresses (loopback, RFC 1918, CGNAT,
# link-local, cloud metadata 169.254.169.254, benchmark/documentation ranges).
#
# Pre-reqs:
#   - libgomesi.so built with ParseWithConfig (libgomesi.go)
#   - The ngx_http_mesi_module.so loaded via load_module
#
# Usage:
#   Drop these directives into a `location` block and reload nginx.

location / {
    enable_mesi on;

    # Secure default: block ESI includes to private/reserved IPs.
    # Set `off` ONLY for trusted internal deployments that intentionally
    # include from backends on private IPs.
    mesi_block_private_ips on;

    proxy_pass http://backend;
}

# Trusted internal deployment that must include from a private backend.
# SSRF protection is disabled for this location only.
location /internal/ {
    enable_mesi on;
    mesi_block_private_ips off;
    proxy_pass http://internal-backend;
}
