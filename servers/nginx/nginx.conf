load_module /usr/lib/nginx/modules/ngx_http_mesi_module.so;

worker_processes  1;
error_log  stderr debug;

pid        nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /usr/local/nginx/conf/mime.types;
    access_log stdout;
    default_type  text/html;

    keepalive_timeout  65;
    server {
        listen       8080;
        server_name  _;

        location / {
            enable_mesi on;
            # Test backend resolves to a private Docker IP; opt out of SSRF
            # blocking here so the existing include fixtures keep working.
            # Real deployments should leave the secure default (on) in place.
            mesi_block_private_ips off;
            root   /usr/share/nginx/html;
            index  index.html;
        }

        location /cache/ {
            enable_mesi on;
            mesi_block_private_ips off;
            mesi_cache_backend memory;
            mesi_cache_size 10000;
            mesi_cache_ttl 30;
            alias /usr/share/nginx/html/;
        }

        location /cache/memcached/ {
            enable_mesi on;
            mesi_block_private_ips off;
            mesi_cache_backend memcached;
            mesi_cache_ttl 30;
            mesi_cache_memcached_servers "memcached:11211";
            alias /usr/share/nginx/html/;
        }

        # SSRF protection: default (unset) must block private IPs.
        location /ssrf-default/ {
            enable_mesi on;
            alias  /usr/share/nginx/html/;
            index  ssrf.html;
        }

        # SSRF protection: explicit on must block private IPs.
        location /ssrf-on/ {
            enable_mesi on;
            mesi_block_private_ips on;
            alias  /usr/share/nginx/html/;
            index  ssrf.html;
        }

        # SSRF protection: explicit off must allow private IPs.
        location /ssrf-off/ {
            enable_mesi on;
            mesi_block_private_ips off;
            alias  /usr/share/nginx/html/;
            index  ssrf.html;
        }
    }
}
