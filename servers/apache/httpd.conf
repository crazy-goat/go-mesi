LoadModule mesi_module /usr/lib/apache2/modules/mod_mesi.so

LogLevel debug

EnableMesi on
MesiAllowedHosts backend raw.githubusercontent.com
MesiBlockPrivateIPs Off
# Memory cache wired into the same process as the filter so duplicate
# <esi:include> URLs declared within TTL are served from libgomesi's
# in-memory cache. Backend must be the literal "memory" — any other
# value errors out so a typo never silently disables caching.
MesiCacheBackend memory
MesiCacheSize 1000
MesiCacheTTL 60

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass /backend/ http://backend:8000/
    ProxyPassReverse /backend/ http://backend:8000/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
