LoadModule mesi_module /usr/lib/apache2/modules/mod_mesi.so

# Extra listeners for the SSRF bypass integration tests (#168):
# 8081 = MesiAllowPrivateIPsForAllowedHosts On, 8082 = Off.
Listen 8081
Listen 8082

LogLevel debug

EnableMesi on
MesiAllowedHosts backend raw.githubusercontent.com
MesiBlockPrivateIPs Off
# Memory cache wired into the same process as the filter so duplicate
# <esi:include> URLs declared within TTL are served from libgomesi's
# in-memory cache. Backend must be one of "memory", "redis", or
# "memcached" — any other value errors out so a typo never silently
# disables caching.
MesiCacheBackend memory
MesiCacheSize 1000
MesiCacheTTL 60
# To switch to Redis instead, replace the block above with:
# MesiCacheBackend redis
# MesiCacheRedisAddr 10.0.0.5:6379
# MesiCacheRedisPassword secret
# MesiCacheRedisDB 0
# MesiCacheTTL 60
# To switch to Memcached instead, replace the block above with:
# MesiCacheBackend memcached
# MesiCacheMemcachedServers 10.0.0.1:11211 10.0.0.2:11211
# MesiCacheTTL 60

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyPass /backend/ http://backend:8000/
    ProxyPassReverse /backend/ http://backend:8000/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# SSRF bypass-on host: BlockPrivateIPs On + AllowedHosts backend +
# AllowPrivateIPsForAllowedHosts On. Includes to backend (a private
# docker IP) must succeed; includes to hosts outside AllowedHosts must
# still be blocked. Used by test.sh (#168).
<VirtualHost *:8081>
    ServerName localhost
    DocumentRoot /var/www/html

    EnableMesi on
    MesiAllowedHosts backend
    MesiBlockPrivateIPs On
    MesiAllowPrivateIPsForAllowedHosts On

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# SSRF bypass-off host: identical to 8081 but AllowPrivateIPsForAllowedHosts
# left at its default (Off). Includes to backend (private IP) must be
# blocked by BlockPrivateIPs. Used by test.sh (#168).
<VirtualHost *:8082>
    ServerName localhost
    DocumentRoot /var/www/html

    EnableMesi on
    MesiAllowedHosts backend
    MesiBlockPrivateIPs On

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
