services:
  apache:
    image: go-mesi-apache-test
    build:
      context: ../..
      dockerfile: servers/apache/Dockerfile
    ports:
      - "8080:80"
    environment:
      - MESI_FORCE_FLATTEN_ERROR=${MESI_FORCE_FLATTEN_ERROR:-}
    volumes:
      - ./tests:/var/www/html:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 2s
      retries: 10
      start_period: 5s

  backend:
    image: python:3.11-slim
    working_dir: /data
    volumes:
      - ./tests:/data
    command: python -m http.server 8000
    expose:
      - "8000"
